<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bank Two-Layer Additive Model</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="shell">
      <div class="hero">
        <div>
          <p id="eyebrow">GitHub Pages Demo</p>
          <h1 id="title">Bank Two-Layer Additive Model</h1>
          <p id="subtitle">
            Enter banking features, then run the pre-exported two-layer model directly in your browser.
          </p>
        </div>
        <div class="model-tag" id="hero-stats">Loading...</div>
      </div>

      <div class="grid">
        <section class="panel input-panel">
          <h2 class="panel-title" id="input-title">Input</h2>
          <form id="prediction-form">
            <div class="control lang-control">
              <label for="language-select" id="language-label">Language</label>
              <select id="language-select" aria-label="Language"></select>
            </div>
            <div class="control-group">
              <div>
                <p class="group-title" id="numeric-title">Numeric Features</p>
                <div id="numeric-controls"></div>
              </div>
              <div>
                <p class="group-title" id="categorical-title">Categorical Features</p>
                <div id="categorical-controls"></div>
              </div>
            </div>
            <div class="run-row">
              <button type="submit" class="run-button" id="run-button">Run Model</button>
              <div class="helper-text" id="helper-text">Submit to see predictions.</div>
            </div>
          </form>
        </section>

        <section class="panel results-panel">
          <div id="result-root">
            <div class="summary-card summary-card-muted">
              <div class="summary-kicker" id="output-title">Model Output</div>
              <div class="summary-value">0.0%</div>
              <div class="summary-label" id="placeholder-text">Submit the form to see predictions.</div>
              <div class="summary-meta" id="output-meta"></div>
            </div>
          </div>
        </section>
      </div>
    </div>

    <script src="./app.js" type="module"></script>
  </body>
</html>
